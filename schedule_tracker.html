<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Day Schedule Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .day-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .day-card:hover {
            transform: translateY(-5px);
        }

        .day-header {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-text {
            flex: 1;
            font-size: 0.95em;
            color: #333;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }

        .add-task-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .add-task-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input,
        .input-group select {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group input {
            flex: 1;
        }

        .input-group select {
            width: 150px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .performance-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e9ecef;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .day-performance {
            margin-bottom: 20px;
        }

        .day-performance h4 {
            margin-bottom: 10px;
            color: #333;
        }

        @media (max-width: 768px) {
            .day-grid {
                grid-template-columns: 1fr;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 10-Day Schedule Tracker</h1>
            <p>Organize your tasks and track your performance</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('schedule')">Schedule</button>
            <button class="tab" onclick="switchTab('performance')">Performance</button>
        </div>

        <div id="schedule-tab" class="tab-content active">
            <div class="day-grid" id="dayGrid"></div>
            
            <div class="add-task-section">
                <h3>➕ Add New Task</h3>
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Enter task description...">
                    <select id="daySelect">
                        <option value="">Select Day</option>
                    </select>
                    <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                </div>
            </div>
        </div>

        <div id="performance-tab" class="tab-content">
            <div class="performance-stats" id="performanceStats"></div>
            <div id="dailyPerformance"></div>
        </div>
    </div>

    <script>
        const initialTasks = {
            1: ['Morning workout', 'Team meeting at 10 AM'],
            2: ['Review project documentation', 'Client presentation'],
            3: ['Code review session', 'Update task board'],
            4: ['Design mockups review', 'Sprint planning'],
            5: ['1-on-1 with manager', 'Complete testing phase'],
            6: ['Deploy to staging', 'Bug fixes'],
            7: ['Team retrospective', 'Document new features'],
            8: ['Performance optimization', 'Security audit'],
            9: ['User feedback analysis', 'Prepare weekly report'],
            10: ['Final review', 'Week planning']
        };

        let tasks = {};

        function initializeTasks() {
            const stored = localStorage.getItem('scheduleTasks');
            if (stored) {
                tasks = JSON.parse(stored);
            } else {
                for (let day = 1; day <= 10; day++) {
                    tasks[day] = (initialTasks[day] || []).map(text => ({
                        text: text,
                        completed: false,
                        id: Date.now() + Math.random()
                    }));
                }
                saveTasks();
            }
        }

        function saveTasks() {
            localStorage.setItem('scheduleTasks', JSON.stringify(tasks));
        }

        function renderSchedule() {
            const grid = document.getElementById('dayGrid');
            const select = document.getElementById('daySelect');
            grid.innerHTML = '';
            select.innerHTML = '<option value="">Select Day</option>';

            for (let day = 1; day <= 10; day++) {
                const dayTasks = tasks[day] || [];
                const completed = dayTasks.filter(t => t.completed).length;
                const total = dayTasks.length;
                const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `
                    <div class="day-header">
                        <span>Day ${day}</span>
                        <span style="font-size: 0.8em; color: #667eea;">${completed}/${total}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%">${percentage}%</div>
                    </div>
                    <ul class="task-list" id="tasks-day-${day}">
                        ${dayTasks.map(task => `
                            <li class="task-item">
                                <input type="checkbox" class="task-checkbox" 
                                    ${task.completed ? 'checked' : ''} 
                                    onchange="toggleTask(${day}, '${task.id}')">
                                <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                grid.appendChild(card);

                const option = document.createElement('option');
                option.value = day;
                option.textContent = `Day ${day}`;
                select.appendChild(option);
            }
        }

        function toggleTask(day, taskId) {
            const task = tasks[day].find(t => t.id == taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderSchedule();
                renderPerformance();
            }
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const select = document.getElementById('daySelect');
            const text = input.value.trim();
            const day = parseInt(select.value);

            if (!text || !day) {
                alert('Please enter a task and select a day!');
                return;
            }

            if (!tasks[day]) {
                tasks[day] = [];
            }

            tasks[day].push({
                text: text,
                completed: false,
                id: Date.now() + Math.random()
            });

            saveTasks();
            renderSchedule();
            renderPerformance();
            input.value = '';
            select.value = '';
        }

        function renderPerformance() {
            let totalTasks = 0;
            let completedTasks = 0;

            for (let day = 1; day <= 10; day++) {
                const dayTasks = tasks[day] || [];
                totalTasks += dayTasks.length;
                completedTasks += dayTasks.filter(t => t.completed).length;
            }

            const percentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            const activeDays = Object.keys(tasks).filter(day => tasks[day].length > 0).length;

            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-number">${completedTasks}</div>
                    <div class="stat-label">Tasks Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalTasks}</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${percentage}%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${activeDays}</div>
                    <div class="stat-label">Active Days</div>
                </div>
            `;

            document.getElementById('performanceStats').innerHTML = statsHtml;

            let dailyHtml = '<h3 style="margin-bottom: 20px; color: #333;">Daily Performance</h3>';
            for (let day = 1; day <= 10; day++) {
                const dayTasks = tasks[day] || [];
                const completed = dayTasks.filter(t => t.completed).length;
                const total = dayTasks.length;
                const dayPercentage = total > 0 ? Math.round((completed / total) * 100) : 0;

                dailyHtml += `
                    <div class="day-performance">
                        <h4>Day ${day} - ${completed}/${total} tasks completed</h4>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${dayPercentage}%">${dayPercentage}%</div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('dailyPerformance').innerHTML = dailyHtml;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');

            if (tab === 'performance') {
                renderPerformance();
            }
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        initializeTasks();
        renderSchedule();
        renderPerformance();
    </script>
</body>
</html>
